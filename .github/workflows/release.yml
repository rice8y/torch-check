name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable
      - name: Verify tag matches package version
        run: test "v$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')" = "$GITHUB_REF_NAME"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Validate reviewed compatibility metadata
        run: |
          python3 -m unittest discover -s scripts/tests -v
          python3 scripts/check_reviewed_metadata.py
      - run: cargo test --workspace --all-features --locked
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps --locked
      - run: cargo package --locked
      - name: Install RustSec audit tool
        run: cargo install cargo-audit --version 0.22.2 --locked
      - run: cargo audit --deny warnings

  binary:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            executable: torch-check
            archive: tar.gz
            python: python3
            install_musl: true
            production: true
            rustflags: ''
            macos_deployment_target: ''
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-musl
            executable: torch-check
            archive: tar.gz
            python: python3
            install_musl: true
            production: false
            rustflags: ''
            macos_deployment_target: ''
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            executable: torch-check
            archive: tar.gz
            python: python3
            install_musl: false
            production: false
            rustflags: ''
            macos_deployment_target: '10.15'
          - runner: macos-15
            target: aarch64-apple-darwin
            executable: torch-check
            archive: tar.gz
            python: python3
            install_musl: false
            production: false
            rustflags: ''
            macos_deployment_target: '11.0'
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            executable: torch-check.exe
            archive: zip
            python: python
            install_musl: false
            production: false
            rustflags: '-C target-feature=+crt-static'
            macos_deployment_target: ''
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    env:
      TARGET: ${{ matrix.target }}
      BINARY: target/${{ matrix.target }}/release/${{ matrix.executable }}
      EXECUTABLE: ${{ matrix.executable }}
      ARCHIVE_NAME: torch-check-${{ github.ref_name }}-${{ matrix.target }}
      PYTHON: ${{ matrix.python }}
      RUSTFLAGS: ${{ matrix.rustflags }}
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "$TARGET"
      - name: Install musl toolchain
        if: ${{ matrix.install_musl }}
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
      - name: Install third-party license generator
        run: cargo install cargo-about --version 0.9.1 --locked --features cli
      - name: Test native target
        run: cargo test --workspace --all-features --locked --target "$TARGET"
      - name: Build release binary
        run: cargo build --release --locked --target "$TARGET"
      - name: Smoke-test CLI contract
        run: |
          "$BINARY" --version
          "$BINARY" --help > /dev/null
          set +e
          "$BINARY" --definitely-invalid > /dev/null 2> parse-error.txt
          status=$?
          set -e
          test "$status" -eq 2
          grep -q '^Usage: torch-check' parse-error.txt
          if grep -Fq '\n\nUsage:' parse-error.txt; then
            echo 'parse error contains escaped structural newlines'
            exit 1
          fi
      - name: Smoke-test Ubuntu 22.04 production support
        if: ${{ matrix.production }}
        run: |
          set +e
          report=$("$BINARY" inspect --format json)
          status=$?
          set -e
          test "$status" -le 1
          printf '%s' "$report" | "$PYTHON" -c 'import json, sys; report = json.load(sys.stdin); environment = report["environment"]; assert report["schema_version"] == 1; assert environment["os"] == "linux"; assert environment["architecture"] == "x86_64"; assert environment["distribution"].startswith("Ubuntu 22.04"); assert environment["glibc"] == "2.35"; assert not {"unsupported_operating_system", "unsupported_architecture", "unsupported_libc"} & {item["code"] for item in environment["diagnostics"]}'
          if readelf -l "$BINARY" | grep -q 'INTERP'; then
            echo 'Linux release binary has a dynamic interpreter'
            exit 1
          fi
          if readelf -d "$BINARY" 2> /dev/null | grep -q 'NEEDED'; then
            echo 'Linux release binary has dynamic dependencies'
            exit 1
          fi
      - name: Smoke-test inspection boundary
        if: ${{ matrix.production == false }}
        run: |
          set +e
          report=$("$BINARY" inspect --format json)
          status=$?
          set -e
          test "$status" -eq 2
          printf '%s' "$report" | "$PYTHON" -c 'import json, sys; report = json.load(sys.stdin); diagnostics = report["environment"]["diagnostics"]; assert report["schema_version"] == 1; assert {"unsupported_operating_system", "unsupported_architecture"} & {item["code"] for item in diagnostics}'
      - name: Generate distribution files
        run: |
          root="dist/$ARCHIVE_NAME"
          mkdir -p "$root/completions" "$root/man"
          cp "$BINARY" "$root/$EXECUTABLE"
          cp README.md SECURITY.md LICENSE LICENSE-APACHE LICENSE-MIT "$root/"
          "$BINARY" completions bash > "$root/completions/torch-check.bash"
          "$BINARY" completions zsh > "$root/completions/_torch-check"
          "$BINARY" completions fish > "$root/completions/torch-check.fish"
          "$BINARY" man > "$root/man/torch-check.1"
          cargo about generate --locked --offline --target "$TARGET" --fail about.hbs --output-file "$root/THIRD-PARTY-LICENSES.html"
      - name: Create tar archive
        if: ${{ matrix.archive == 'tar.gz' }}
        run: tar -C dist -czf "$PWD/$ARCHIVE_NAME.tar.gz" "$ARCHIVE_NAME"
      - name: Create zip archive
        if: ${{ matrix.archive == 'zip' }}
        run: powershell.exe -NoLogo -NoProfile -Command "Compress-Archive -LiteralPath 'dist/$ARCHIVE_NAME' -DestinationPath '$ARCHIVE_NAME.zip'"
      - name: Upload target archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: torch-check-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error
          compression-level: 0

  release-assets:
    needs: binary
    runs-on: ubuntu-22.04
    steps:
      - name: Download target archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          merge-multiple: true
      - name: Generate aggregate checksums
        run: |
          shopt -s nullglob
          assets=(torch-check-*.tar.gz torch-check-*.zip)
          if [[ "${#assets[@]}" -ne 5 ]]; then
            echo "::error::expected 5 release archives, found ${#assets[@]}"
            exit 1
          fi
          printf '%s\n' "${assets[@]}" | LC_ALL=C sort | xargs sha256sum > SHA256SUMS
      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: |
            torch-check-*.tar.gz
            torch-check-*.zip
            SHA256SUMS
          if-no-files-found: error
          compression-level: 0

  publish:
    needs: [validate, release-assets]
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Download assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
      - name: Require crates.io release token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ -z "$CARGO_REGISTRY_TOKEN" ]]; then
            echo "::error::CARGO_REGISTRY_TOKEN is required for a release"
            exit 1
          fi
      - name: Prepare draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" torch-check-*.tar.gz torch-check-*.zip SHA256SUMS --clobber
          else
            gh release create "$GITHUB_REF_NAME" torch-check-*.tar.gz torch-check-*.zip SHA256SUMS \
              --verify-tag \
              --generate-notes \
              --draft
          fi
      - name: Publish crate to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          package_name=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')
          package_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          version_url="https://crates.io/api/v1/crates/$package_name/$package_version"
          status=$(curl --silent --show-error \
            --header 'User-Agent: torch-check-release-workflow' \
            --output /dev/null \
            --write-out '%{http_code}' \
            "$version_url")
          case "$status" in
            200)
              cargo package --locked
              published_checksum=$(curl --fail --silent --show-error \
                --header 'User-Agent: torch-check-release-workflow' \
                "$version_url" | jq -er '.version.checksum')
              package_path="target/package/${package_name}-${package_version}.crate"
              local_checksum=$(sha256sum "$package_path" | cut -d ' ' -f 1)
              if [[ "$published_checksum" != "$local_checksum" ]]; then
                echo "::error::$package_name $package_version already exists on crates.io with a different checksum"
                exit 1
              fi
              echo "$package_name $package_version is already published with the expected checksum; continuing the release"
              ;;
            404) cargo publish --locked ;;
            *) echo "::error::unexpected crates.io API status: $status"; exit 1 ;;
          esac
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq '.isDraft')" == 'true' ]]; then
            gh release edit "$GITHUB_REF_NAME" --draft=false
          fi
